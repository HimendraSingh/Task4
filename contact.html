<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us & Submissions - Maincrafts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Maincrafts</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact & Submissions</a></li>
            <li><a href="submissions.html">Submissions</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
    </nav>

    <section class="contact-section">
        <div class="form-container">
            <h2>Contact Us</h2>
            <p>Feel free to drop a message. We will get back to you shortly.</p>
            
            <form id="contactForm">
                <div class="form-group">
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <input type="textarea" id="message" name="message" rows="5" placeholder="Enter your message" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </section>

    <section class="features" style="padding-top: 0px;">
        <h2>Live Form Submissions</h2>
        <div class="features-grid" id="submissionsGrid" aria-live="polite"></div>
    </section>

    <footer>
        <p>&copy; 2026 Maincrafts Technology. Designed & Developed by Himendra Singh.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        window.onload = displaySubmissions;
    </script>
</body>
</html>
